spring.application.name=ymlToProperties

# Render provides PORT; default 8080 for local runs
server.port=${PORT:8080}

# Enable forwarded headers when running behind proxies/load balancers (Render, Nginx, etc.)
server.forward-headers-strategy=framework

# Force HTTPS in production
app.security.require-https=true

# API misuse controls
app.security.rate-limit.max-requests=30
app.security.rate-limit.window-seconds=60

# Shared static key for request encryption (must match UI constant)
app.crypto.request-static-key=sK9!pQ2#xL7@vM4$zT8&nR1*eW6^yU3?
